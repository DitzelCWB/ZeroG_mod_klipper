[respond]
[include chopper_tune.cfg]
[include macros.cfg]
[include mainsail.cfg]
[include PIS.cfg]

[exclude_object]

;[autotune_tmc stepper_x]
;motor: honeybadger-42hs48-25044a
;[autotune_tmc stepper_y]
;motor: honeybadger-42hs48-25044a

;[autotune_tmc extruder]
;motor: moons-cse14hra1l410a

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_35FFD6054246303035591457-if00

[mcu z]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0

[static_digital_output usb_pullup_enable]
pins: !PA14

[beacon]  
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevD_435FD3F8515137474C202020FF0C0D2D-if00
x_offset: 0  
y_offset: 30 
mesh_main_direction: x  
mesh_runs: 2
;backlash_comp: 0.00682
cal_nozzle_z: 0.1
speed: 20         # Z probing dive speed.
lift_speed: 30     # Z probing lift speed.

[safe_z_home]  
home_xy_position: 115,115
speed: 400
z_hop: 5
z_hop_speed: 5

[bed_mesh]
speed: 400
mesh_min: 15, 30
mesh_max: 215, 215
probe_count: 21, 21
algorithm: bicubic
bicubic_tension: .1
adaptive_margin: 5

[z_tilt]
z_positions: 115,230
             0,45
             230,45
             
points:      115,185
             15,15
             215,15
speed: 200
horizontal_move_z: 15
retries: 20
retry_tolerance: 0.01

[bed_screws]
speed: 400
screw1: 32, 28
screw1_name: front left
screw2: 202, 28
screw2_name: front right
screw3: 202, 200
screw3_name: back right
screw4: 32, 200
screw4_name: back left

[screws_tilt_adjust]
speed: 400
horizontal_move_z: 5
screw_thread: CW-M4
screw1: 32, 0
screw1_name: front left
screw2: 202, 0
screw2_name: front right
screw3: 202, 170
screw3_name: back right
screw4: 32, 170
screw4_name: back left

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 64
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 40
endstop_pin: ^PC0
position_min: 0
position_endstop: 0
position_max: 230
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
interpolate: True
sense_resistor: 0.110
;run_current: 1.414
run_current: 0.976  # results in CS 31
driver_TBL: 1
driver_TOFF: 3  # 41.7kHz max chopper frequency
driver_HSTRT: 7
driver_HEND: 8
;driver_TBL: 1
;driver_TOFF: 3 # 45.45 kHz max chopper frequency
;driver_HSTRT: 2
;driver_HEND: 13

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 64
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 40
endstop_pin: ^PC1
position_min: 0
position_endstop: 0
position_max: 230
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
interpolate: True
sense_resistor: 0.110
;run_current: 1.414
run_current: 0.976  # results in CS 31
driver_TBL: 1
driver_TOFF: 3  # 41.7kHz max chopper frequency
driver_HSTRT: 7
driver_HEND: 8
;driver_TBL: 1
;driver_TOFF: 3 # 45.45 kHz max chopper frequency
;driver_HSTRT: 2
;driver_HEND: 13

[stepper_z]
step_pin: z:PC6
dir_pin: !z:PC7
enable_pin: !z:PD6
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 8 # ACME lead screw
endstop_pin: probe:z_virtual_endstop # use beacon as virtual endstop
position_min: -5
position_max: 330
homing_speed: 5
homing_retract_dist: 0               # beacon needs this to be set to 0

[stepper_z1]
step_pin: z:PB3
dir_pin: !z:PB2
enable_pin: !z:PA5
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 8 # ACME lead screw

[stepper_z2]
step_pin: z:PD7
dir_pin: !z:PC5
enable_pin: !z:PD6
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 8 # ACME lead screw

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 64
full_steps_per_rotation: 200 #1.8deg Motor
#rotation_distance: 22.9057395 #for 5mm Shaft Driven Bondtech gearsets# SHERPA
#rotation_distance: 23.1203808 # Hextrudort Ridga
#gear_ratio: 50:10 #for standard 10t motor SHERPA / Hextrudort
rotation_distance: 29.304 #Alu VZhextrudort Moons 8T
Gear_ratio: 50:8 #Alu VZhextrudort Moons 8T
nozzle_diameter: 0.400
filament_diameter: 1.750
#max_extrude_cross_section: 5 #Sherpa
#max_extrude_only_distance: 1400.0 #Sherpa
#max_extrude_only_velocity: 75.0 #Sherpa
#max_extrude_only_accel: 1500 #Sherpa
max_extrude_only_distance: 1000.0 #Hextrudort
max_extrude_cross_section: 500 #Hextrudort
max_extrude_only_velocity: 200 #Hextrudort
max_extrude_only_accel: 10000 #Hextrudort
heater_pin: PC8
sensor_type: MAX31865 # PT1000
sensor_pin: PA9
spi_software_sclk_pin: PA15 
spi_software_mosi_pin: PB9 
spi_software_miso_pin: PB5 
rtd_nominal_r: 1000 #PT100 100
rtd_reference_r: 4300 #PT100 430
rtd_num_of_wires: 2
rtd_use_50Hz_filter: True
# tuned for Rapido 270 degrees Celsius target / 40% Part Fan CPAP
control = pid
pid_kp = 18.591
pid_ki = 1.333
pid_kd = 64.835
min_extrude_temp: 170
min_temp: 0
max_temp: 350
pressure_advance_smooth_time: 0.02

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
interpolate: True
#Run current is listed in RMS
#run_current: 0.30 #min current, equivalent to 0.42A peak (Peak = RMS/0.707) SHERPA
#run_current: 0.35 #max current, equivalent to 0.49A peak (Peak = RMS/0.707) SHERPA
;run_current: 0.45
;run_current: 0.5656
sense_resistor: 0.110
;run_current: 0.460  # results in CS 14
;driver_TBL: 1
;driver_TOFF: 3  # 41.7kHz max chopper frequency
;driver_HSTRT: 7
;driver_HEND: 5
run_current: 0.520  # results in CS 16
driver_TBL: 1
driver_TOFF: 3  # 41.7kHz max chopper frequency
driver_HSTRT: 7
driver_HEND: 8

[firmware_retraction]
retract_length: 0.5
retract_speed: 30
unretract_extra_length: 0
unretract_speed: 30

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
# tuned for stock hardware with 90 degree Celsius + Nevermore + Filter low + 30% 4028 CPAP
control = pid
pid_kp = 72.473
pid_ki = 1.837
pid_kd = 714.770
min_temp: 0
max_temp: 120

[verify_heater heater_bed]
max_error: 120
check_gain_time: 90
hysteresis: 5
heating_gain: 2

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[heater_fan hotend_fan]
pin: z:PB4 
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

[fan]
# Print Cooling Fan
pin: PC6                          # Delta 12V Server Fan needs !PC6
max_power: 0.8
shutdown_speed: 0
cycle_time: 0.005
;cycle_time: 0.00004              # 25KHZ PWM Signal Delta 12V Server Fan
hardware_pwm: False
kick_start_time: 0.100
off_below: 0.1
;enable_pin: z:PD4                # Delta 12V Server Fan

[controller_fan psu_cooling_fan]
pin: PC7

[controller_fan nevermore_filter]
pin: z:PD5
fan_speed: 0.8
;idle_timeout: 1200 ; 20 minutes
stepper: extruder

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor s905x3]
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp
min_temp: 0
max_temp: 100

[temperature_sensor chamber]
sensor_type: ATC Semitec 104GT-2
pullup_resistor: 370000
sensor_pin: PA0
min_temp: 0
max_temp: 100

[neopixel lights]
pin: PA8
chain_count: 18
color_order: GRBW
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0
initial_WHITE: 1.0

[printer]
kinematics: corexy
max_velocity: 1000
max_accel: 10000
max_z_velocity: 15
max_z_accel: 500
square_corner_velocity: 10

[gcode_arcs]
resolution: 0.1

[idle_timeout]
gcode:
    {% if "xyz" in printer.toolhead.homed_axes %}
        G91                  ; relative positioning
        G1 Z10               ; move up 10mm
        G90                  ; absolute positioning
        G1 X115 Y225 F6000.0 ; park nozzle at rear
    {% endif %}
    OFF
    LIGHTS_OFF
timeout: 3600 # 1 Hour

[input_shaper]
shaper_freq_x: 67.6
shaper_type_x: mzv
damping_ratio_x: 0.059
shaper_freq_y: 88.6
shaper_type_y: 3hump_ei
damping_ratio_y: 0.059

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True  ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 0.0   ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 0.0   ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 2.0   ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 1.0   ; the value to retract while PAUSE
variable_cancel_retract   : 5.0   ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 30.0  ; retract speed in mm/s
variable_unretract        : 1.0   ; the value to unretract while RESUME
variable_speed_unretract  : 30.0  ; unretract speed in mm/s
variable_speed_hop        : 15.0  ; z move speed in mm/s
variable_speed_move       : 100.0 ; move speed in mm/s
variable_park_at_cancel   : True  ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : 115   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : 225   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
