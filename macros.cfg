[gcode_macro START_PRINT]
;variable_bed_temp: 0
;variable_extruder_temp: 0
;variable_chamber_temp: 0
;gcode:
    # Parameters
    ;{% set bed_temp = params.BED_TEMP|int %}
    ;{% set extruder_temp = params.EXTRUDER_TEMP|int %}
    ;{% set chamber = params.CHAMBER|default(0)|int %}

    # Set the parameters as persistent variables so they can be referenced outside of the macro (in PRINT_END)
    ;SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=bed_temp VALUE={bed_temp}
    ;SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=extruder_temp VALUE={extruder_temp}
    ;SET_GCODE_VARIABLE MACRO=START_PRINT VARIABLE=chamber_temp VALUE={chamber}
        
    ;LIGHTS_ON
    ;BED_MESH_CLEAR
    ;M140 S{bed_temp}                                 ; start bed heater
    ;M190 S{bed_temp}                                 ; wait on bed temperature
    ;G4 P60000                                        ; optional, let temps settle for 1 min
    ;G28                                              ; home axes
    ;Z_TILT_ADJUST                                    ; or QGL to balance towers
    ;G28 Z
    ;BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5  ; bed mesh in scan mode
    ;G1 X3 Y3 Z0 F6000                                ; move to corner
    ;M104 S{extruder_temp}                            ; set extruder to print temp
    ;M109 S{extruder_temp}                            ; wait for extruder temp
    ;G1 Z0.2 F300                                     ; raise nozzle to 0.2
    ;G92 E0.0                                         ; reset extruder distance position
    ;G1 X60.0 E9.0 F1000.0                            ; intro line
    ;G1 X100.0 E21.5 F1000.0                          ; intro line
    ;G0 Z2                                            ; raise nozzle to 2
    ;G92 E0.0                                         ; reset extruder distance position

gcode:
  # This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}
  {% set target_chamber = params.CHAMBER|default("45")|int %}
  {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
  {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

  SET_GCODE_OFFSET Z=0                                   # Set offset to 0
  G28 XY                                                 # Home (XY)
  G28 Z METHOD=PROXIMITY                                 # Home Z
  G90                                                    # Absolute position
  BED_MESH_CLEAR                                         # Clear old saved bed mesh (if any)
  G1 X{x_wait} Y{y_wait} Z2 F9000                        # Go to center of the bed
  M190 S{target_bed}                                     # Set the target temp for the bed
  G4 P300000                                             # Wait 5 min for the bedtemp to stabilize
  M109 S150                                              # Heat hotend to 150c
  SWIPE                                                  # Clean nozzle
  G28 Z METHOD=CONTACT CALIBRATE=1                       # Calibrate z offset and beacon model
  Z_TILT_ADJUST                                          # Level the printer via Z_TILT_ADJUST
  G28 Z                                                  # Home Z again after Z_TILT_ADJUST
  BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5 RUNS=2 # Start the bed mesh (add ADAPTIVE=1) for adaptive bed mesh
  SWIPE                                                  # Clean nozzle
  G28 Z METHOD=CONTACT CALIBRATE=0                       # Calibrate z offset only with hot nozzle
  ;SET_GCODE_OFFSET Z=0.04                                # Add a little offset for hotend thermal expansion

  G1 X3 Y3 Z0 F6000                                      # Move to corner
  M104 S{target_extruder}                                # Set extruder to print temp
  M109 S{target_extruder}                                # Wait for extruder temp
  G1 Z0.2 F300                                           # Raise nozzle to 0.2
  G0 E70 F300                                            # Extrude 70mm
  G92 E0.0                                               # Reset extruder distance position
  G1 X60.0 E9.0 F1000.0                                  # Intro line
  G1 X200.0 E21.5 F1000.0                                # Intro line
  G0 Z2                                                  # Raise nozzle to 2
  G92 E0.0                                               # Reset extruder distance position

[gcode_macro END_PRINT]
gcode:
    #   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}
    
    #   Check end position to determine safe directions to move
    {% if printer.toolhead.position.x < (max_x - 15) %}
        {% set x_safe = 10.0 %}
    {% else %}
        {% set x_safe = -10.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 15) %}
        {% set y_safe = 10.0 %}
    {% else %}
        {% set y_safe = -10.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 50.0 %}
    {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    M400                                 ; wait for buffer to clear
    G92 E0                               ; zero the extruder
    ;G1 E-10.0 F3600                      ; retract
    G91                                  ; relative positioning
    G0 Z{z_safe} + Z10 F3600             ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000        ; move nozzle to remove stringing
    G0 E10 F500                          ; push out molten filament
    G0 E-25 F3000                        ; retract quickly to cold zone
    G4 P10000                            ; wait to cool 10s
    G0 E-45 F3000                        ; retract quickly all the way
    M104 S0                              ; turn off hotend
    M140 S0                              ; turn off bed
    M107                                 ; turn off fan
    G90                                  ; absolute positioning
    G0 X{max_x / 2} Y{max_y - 5} F3600   ; park nozzle at rear
    M84
    OFF

[gcode_macro SWIPE]
variable_start_x: -25
variable_start_y: 70
variable_start_z: -0.3
variable_wipe_dist: 15
variable_wipe_qty: 4
variable_wipe_spd: 100
variable_raise_distance: 5

gcode:
 {% if "xyz" not in printer.toolhead.homed_axes %}
   CG28
 {% endif %}
 
 G90                                            ; absolute positioning
 ## Move nozzle to start position
 G1 X{start_x} F6000
 G1 Y{start_y} F6000
 G1 Z{start_z} F1500

 ## Wipe nozzle
 {% for wipes in range(1, (wipe_qty + 1)) %}
   G1 Y{start_y - wipe_dist} F{wipe_spd * 60}
   G1 Y{start_y} F{wipe_spd * 60}
 {% endfor %}

 ## Raise nozzle
 G1 Z{raise_distance}
 G1 X115 Y115 F6000
 
[gcode_macro CG28]
gcode:
 {% if "x" not in printer.toolhead.homed_axes or "y" not in printer.toolhead.homed_axes or "z" not in printer.toolhead.homed_axes %}
 G28
 {% endif %}

[gcode_macro OFF]
gcode:
    TURN_OFF_HEATERS
    M107 ; turn off fan
    M84 ; disable motors
    
[gcode_macro M201]
gcode:
  {% if 'X' in params or 'Y' in params %}
    {% set accel = (params.X|default(params.Y)|float,
                    params.Y|default(params.X)|float)|min %}
      SET_VELOCITY_LIMIT ACCEL={accel} ACCEL_TO_DECEL={accel * 0.5}
  {% else %}
    SET_VELOCITY_LIMIT
  {% endif %}

[gcode_macro M203]
gcode:
  {% if 'X' in params or 'Y' in params %}
    {% set speed = (params.X|default(params.Y)|float,
                       params.Y|default(params.X)|float)|min %}
    SET_VELOCITY_LIMIT VELOCITY={speed}
  {% else %}
    SET_VELOCITY_LIMIT
  {% endif %}

[gcode_macro M204]
rename_existing: M204.1
gcode:
  {% set f = params.F|default(0.5)|float %}

  {% if 'S' in params %}
    {% set s = params.S|float %}
    SET_VELOCITY_LIMIT ACCEL={s} ACCEL_TO_DECEL={ s * f }
  {% else %}
    {% if 'P' in params %}
      {% set p = params.P|float %}
      {% if 'T' in params %}
        {% set t = params.T|float %}
        {% if p < t %}
          SET_VELOCITY_LIMIT ACCEL={p} ACCEL_TO_DECEL={ p * f }
        {% else %}
          SET_VELOCITY_LIMIT ACCEL={t} ACCEL_TO_DECEL={ t * f }
        {% endif %}
      {% else %}
        SET_VELOCITY_LIMIT ACCEL={p} ACCEL_TO_DECEL={ p * f }
      {% endif %}
    {% elif 'T' in params %}
      {% set t = params.T|float %}
      SET_VELOCITY_LIMIT ACCEL={t} ACCEL_TO_DECEL={ t * f }
    {% endif %}
  {% endif %}

[gcode_macro M205]
gcode:
  {% if 'X' in params or 'Y' in params %}
    {% set corner_speed = (params.X|default(params.Y)|float,
                       params.Y|default(params.X)|float)|min %}
    SET_VELOCITY_LIMIT SQUARE_CORNER_VELOCITY={corner_speed}
  {% else %}
    SET_VELOCITY_LIMIT
  {% endif %}

[gcode_macro M600]
gcode:
    {% set X = params.X|default(50)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state

[gcode_macro M900]
gcode:
	# Parameters
	{% set pa = params.K|float %}
	SET_PRESSURE_ADVANCE ADVANCE={pa}

[gcode_macro M486]
gcode:
  # Parameters known to M486 are as follows:
  #   [C<flag>] Cancel the current object
  #   [P<index>] Cancel the object with the given index
  #   [S<index>] Set the index of the current object.
  #       If the object with the given index has been canceled, this will cause
  #       the firmware to skip to the next object. The value -1 is used to
  #       indicate something that isn’t an object and shouldn’t be skipped.
  #   [T<count>] Reset the state and set the number of objects
  #   [U<index>] Un-cancel the object with the given index. This command will be
  #       ignored if the object has already been skipped

  {% if 'exclude_object' not in printer %}
    {action_raise_error("[exclude_object] is not enabled")}
  {% endif %}

  {% if 'T' in params %}
    EXCLUDE_OBJECT RESET=1

    {% for i in range(params.T | int) %}
      EXCLUDE_OBJECT_DEFINE NAME={i}
    {% endfor %}
  {% endif %}

  {% if 'C' in params %}
    EXCLUDE_OBJECT CURRENT=1
  {% endif %}

  {% if 'P' in params %}
    EXCLUDE_OBJECT NAME={params.P}
  {% endif %}

  {% if 'S' in params %}
    {% if params.S == '-1' %}
      {% if printer.exclude_object.current_object %}
        EXCLUDE_OBJECT_END NAME={printer.exclude_object.current_object}
      {% endif %}
    {% else %}
      EXCLUDE_OBJECT_START NAME={params.S}
    {% endif %}
  {% endif %}

  {% if 'U' in params %}
    EXCLUDE_OBJECT RESET=1 NAME={params.U}
  {% endif %}

[gcode_macro PID_EXTRUDER]
description: PID Tune for the Extruder
gcode:
  {% set TARGET_TEMP = params.TARGET_TEMP|default(260)|float %}
  PID_CALIBRATE HEATER=extruder TARGET={TARGET_TEMP}
  TURN_OFF_HEATERS
  SAVE_CONFIG

[gcode_macro PID_BED]
description: PID Tune for the Bed
gcode:
  {% set TARGET_TEMP = params.TARGET_TEMP|default(110)|float %}
  PID_CALIBRATE HEATER=heater_bed TARGET={TARGET_TEMP}
  TURN_OFF_HEATERS
  SAVE_CONFIG

[gcode_macro PARKCENTER]
gcode:
    G28
    G90
    G0 X115 Y115 Z10 F19500

[gcode_macro LIGHTS_OFF]
gcode:
    SET_LED LED=lights RED=0 GREEN=0 BLUE=0 WHITE=0

[gcode_macro LIGHTS_ON]
gcode:
    SET_LED LED=lights RED=1 GREEN=1 BLUE=1 WHITE=1

[gcode_macro LIGHTS_TOGGLE]
gcode:
    {% if printer["neopixel lights"].color_data[1][2] > 0 %}
    LIGHTS_OFF
    {% else %}
    LIGHTS_ON
    {% endif %}