[include chopper_tune.cfg]
[include mainsail.cfg]
[include macros.cfg]
[include PIS.cfg]
[include config_backup.cfg]
[include KAMP_Settings.cfg]
#[include RatOS/homing.cfg]
#[include RatOS/macros.cfg]
#[include RatOS/shell-macros.cfg]
#[include RatOS/base.cfg]

#[gcode_macro RatOS]
#variable_relative_extrusion: True
#variable_preheat_extruder: True
#variable_calibrate_bed_mesh: False
#variable_nozzle_priming: "primeblob"
#variable_start_print_park_in: "back"
#variable_start_print_park_z_height: 50
#variable_end_print_park_in: "back"
#variable_pause_print_park_in: "back"
#variable_macro_travel_speed: 300
#variable_filament_unload_length: 45
#variable_filament_load_length: 45
#variable_homing_x: "endstop"
#variable_homing_y: "endstop"

[exclude_object]

[skew_correction]

[save_variables]
filename: ~/printer_data/config/variables.txt

[force_move]
enable_force_move: true

[autotune_tmc extruder]
motor: moons-cse14hra1l410a
tuning_goal: performance
voltage: 24.0

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f103xe_35FFD6054246303035591457-if00

[mcu z]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0

[static_digital_output usb_pullup_enable]
pins: !PA14

[beacon]  
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevD_435FD3F8515137474C202020FF0C0D2D-if00
x_offset: 0  
y_offset: 25 
mesh_main_direction: x  
mesh_runs: 2
backlash_comp: 0.008
cal_nozzle_z: 0.1
speed: 4                            # Z probing dive speed.
lift_speed: 4                       # Z probing lift speed.
contact_max_hotend_temperature: 180 # Increase to probe at print temps
home_xy_position: 115, 115          # Update with your safe position
home_z_hop: 5
home_z_hop_speed: 4
home_xy_move_speed: 400
home_method: proximity              # Use proximity for induction homing
home_method_when_homed: proximity   # After initial calibration use induction
home_autocalibrate: unhomed         # Contact will calibrate beacon on first home

[bed_mesh]
speed: 400
mesh_min: 20, 25
mesh_max: 210, 190
zero_reference_position: 115, 115
probe_count: 25, 25
fade_start: 0.5
fade_end: 2
adaptive_margin: 5
split_delta_z: .025
move_check_distance: 5.0
mesh_pps: 2,2
algorithm: bicubic
bicubic_tension: 0.1

[z_tilt]
z_positions:
    20,25
    115,215
    210,25
points:
    20,0
    115,190
    210,0
speed: 400
horizontal_move_z: 5
retries: 20
retry_tolerance: 0.0075

[screws_tilt_adjust]
speed: 400
horizontal_move_z: 5
screw_thread: CW-M4
screw1: 30, 0
screw1_name: front left
screw2: 200, 0
screw2_name: front right
screw3: 200, 150
screw3_name: back right
screw4: 30, 150
screw4_name: back left

[stepper_x]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 40
endstop_pin: ^PC0
position_min: -23
position_endstop: -23
position_max: 237
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 1.2
#Tuned chopper-resonance-tuner speed 91
driver_TBL: 0
driver_TOFF: 1
driver_HSTRT: 1
driver_HEND: 2

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 40
endstop_pin: ^PC1
position_min: -4
position_endstop: -4
position_max: 246
homing_speed: 40
homing_retract_dist: 0

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 1.2
#Tuned chopper-resonance-tuner speed 91
driver_TBL: 0
driver_TOFF: 1
driver_HSTRT: 1
driver_HEND: 2

[stepper_z] #Front Left
step_pin: z:PB3
dir_pin: !z:PB2
enable_pin: !z:PA5
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 8 # ACME lead screw
endstop_pin: probe:z_virtual_endstop # use beacon as virtual endstop
position_min: -10
position_max: 250
homing_speed: 4
homing_retract_dist: 0               # beacon needs this to be set to 0

[stepper_z1] # Rear
step_pin: z:PC6
dir_pin: !z:PC7
enable_pin: !z:PD6
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 8 # ACME lead screw

[stepper_z2]  #Front Right
step_pin: z:PD7
dir_pin: !z:PC5
enable_pin: !z:PD6
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
rotation_distance: 8 # ACME lead screw

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD2
microsteps: 16
full_steps_per_rotation: 200 #1.8deg Motor
gear_ratio: 60:8 #Alu VZhextrudort Moons 8T
rotation_distance: 35.442 #Tuned 100mm
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 1000.0 #Hextrudort
max_extrude_cross_section: 500 #Hextrudort
max_extrude_only_velocity: 200 #Hextrudort
max_extrude_only_accel: 10000 #Hextrudort
heater_pin: PC8
sensor_type: MAX31865 # PT1000
sensor_pin: PA9
spi_software_sclk_pin: PA15 
spi_software_mosi_pin: PB9 
spi_software_miso_pin: PB5 
rtd_nominal_r: 1000 #PT100 100
rtd_reference_r: 4300 #PT100 430
rtd_num_of_wires: 2
rtd_use_50Hz_filter: False
# Rapido 270 degrees Celsius target / 45% Part Fan CPAP / Bed 60 / Levoit Low / Bento Box On
control = pid
pid_kp = 21.985
pid_ki = 1.809
pid_kd = 66.780
min_extrude_temp: 0
min_temp: 0
max_temp: 350
pressure_advance_smooth_time: 0.03

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.7

[firmware_retraction]
retract_length: 0.5
retract_speed: 60
unretract_speed: 60

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC3
# Stock hardware, 110 C + Levoit Low + Bento Box + 20% BTT CPAP + 270 C Hotend
control = pid
pid_kp = 71.964
pid_ki = 0.822
pid_kd = 1576.011
min_temp: 0
max_temp: 120

[verify_heater heater_bed]
max_error: 120
check_gain_time: 90
hysteresis: 5
heating_gain: 2

[verify_heater extruder]
max_error: 120
check_gain_time: 20
hysteresis: 5
heating_gain: 2

[heater_fan hotend_fan]
pin: z:PB4 
heater: extruder
heater_temp: 50.0
fan_speed: 0.8

[fan] # Print Cooling Fan
pin: PC6
max_power: 0.8
shutdown_speed: 0
cycle_time: 0.005
hardware_pwm: False
kick_start_time: 0.100
off_below: 0.1

[controller_fan psu_cooling_fan]
pin: PC7

[controller_fan bento_box]
pin: z:PD5         # Hotend heater pin
fan_speed: 1.0
idle_timeout: 1200 # 20 minutes
heater: extruder
stepper: 

#[controller_fan rcsc]
#pin: z:PD4 #bed heater pin
#fan_speed: 0.5
#heater: extruder
#stepper: 

#[fan_generic RSCS]
##  RSCS Fans - In FAN1 Positon
#pin: z:PD4 #bed heater pin
#max_power: 1
#cycle_time: 0.1
#kick_start_time: 0.100
#off_below: 0.10

[output_pin RSCS]
pin: z:PD4 # Bed heater pin
pwm: true

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor s905x3]
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp
min_temp: 0
max_temp: 100

[temperature_sensor chamber]
sensor_type: ATC Semitec 104GT-2
sensor_pin: PA0
min_temp: 0
max_temp: 100

[neopixel lights]
pin: PA8
chain_count: 36
color_order: GRBW
initial_RED: 1.0
initial_GREEN: 1.0
initial_BLUE: 1.0
initial_WHITE: 1.0

[printer]
kinematics: corexy
max_velocity: 2000
max_accel: 20000
max_z_velocity: 15
max_z_accel: 500
square_corner_velocity: 10

[gcode_arcs]
resolution: 0.1

[idle_timeout]
gcode:
    {% if "xyz" in printer.toolhead.homed_axes %}
        G91                  # Relative positioning
        G1 Z10               # Move up 10mm
        G90                  # Absolute positioning
        PARKBUCKET           # Park nozzle at the bucket
    {% endif %}
    OFF
    LIGHTS_OFF
timeout: 3600                # 1 Hour

[input_shaper]
shaper_freq_x: 90.4
shaper_type_x: ei
damping_ratio_x: 0.034
shaper_freq_y: 56.2
shaper_type_y: mzv
damping_ratio_y: 0.045

[axis_twist_compensation]
calibrate_start_x: 20
calibrate_end_x: 210
calibrate_y: 115
calibrate_start_y: 25
calibrate_end_y: 215
calibrate_x: 115

[linear_movement_vibrations]
accel_chip: adxl345
x_min: 5
x_max: 225
y_min: 5
y_max: 225
output_directory: /home/pi/printer_data/config/linear_vibrations/

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True  ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 0.0   ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 0.0   ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 2.0   ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 1.0   ; the value to retract while PAUSE
variable_cancel_retract   : 10.0  ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 60.0  ; retract speed in mm/s
variable_unretract        : 1.0   ; the value to unretract while RESUME
variable_speed_unretract  : 60.0  ; unretract speed in mm/s
variable_speed_hop        : 5.0   ; z move speed in mm/s
variable_speed_move       : 100.0 ; move speed in mm/s
variable_park_at_cancel   : True  ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : 237   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : 246   ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
